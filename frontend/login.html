<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>GestãoForm - Entrar</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
            primary: { 500: '#10b981', 600: '#059669' }
          }
        }
      }
    }
    
    // Proteção de Rota: Se já estiver logado, joga para o painel imediatamente
    if (localStorage.getItem('token')) {
        window.location.href = 'index.html';
    }
  </script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark-900 flex items-center justify-center h-screen antialiased">

  <div id="toastContainer" class="fixed top-5 right-5 z-[60] flex flex-col gap-2 w-full max-w-xs pointer-events-none"></div>

  <div class="bg-dark-800 p-8 rounded-2xl shadow-2xl border border-dark-700 w-full max-w-md mx-4">
      <div class="text-center mb-8">
          <div class="w-16 h-16 mx-auto rounded-xl bg-gradient-to-br from-primary-500 to-teal-400 flex items-center justify-center text-white font-bold text-2xl mb-4 shadow-lg shadow-primary-500/30">GF</div>
          <h2 class="text-2xl font-bold text-white">Bem-vindo de volta</h2>
          <p class="text-sm text-slate-400 mt-1">Faça login para acessar o sistema</p>
      </div>
      
      <form id="loginForm" class="space-y-5">
          <div>
              <label class="block text-xs uppercase font-bold text-slate-500 mb-1.5 tracking-wider">E-mail</label>
              <input type="email" id="loginEmail" required class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-primary-500 transition-all" placeholder="admin@gestaoform.com">
          </div>
          <div>
              <label class="block text-xs uppercase font-bold text-slate-500 mb-1.5 tracking-wider">Senha</label>
              <input type="password" id="loginSenha" required class="w-full bg-dark-900 border border-dark-600 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:border-primary-500 transition-all" placeholder="••••••••">
          </div>
          <button type="submit" id="btnLogin" class="w-full py-3.5 rounded-xl bg-gradient-to-r from-primary-600 to-teal-500 text-white font-bold shadow-lg shadow-primary-500/20 hover:shadow-primary-500/40 hover:from-primary-500 hover:to-teal-400 transition-all">
              Entrar
          </button>
      </form>
      
      <div class="mt-6 text-center text-xs text-slate-500">
          Acesso Comissão: admin@gestaoform.com / admin123
      </div>
  </div>

  <script type="module">
      import { api } from './js/services/api.js';
      import { showToast } from './js/components/toast.js';

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const btn = document.getElementById('btnLogin');
          const email = document.getElementById('loginEmail').value;
          const senha = document.getElementById('loginSenha').value;

          btn.innerText = "Autenticando...";
          btn.disabled = true;

          try {
              const dados = await api.login(email, senha);
              // Salva os dados do usuário no Navegador
              localStorage.setItem('token', dados.token);
              localStorage.setItem('perfil', dados.perfil);
              localStorage.setItem('nomeUsuario', dados.nome);
              
              showToast("Login efetuado com sucesso!");
              
              // Redireciona para o painel após um breve momento
              setTimeout(() => {
                  window.location.href = 'index.html';
              }, 600);
          } catch (err) {
              showToast("E-mail ou senha incorretos!", "error");
              btn.innerText = "Entrar";
              btn.disabled = false;
          }
      });
  </script>
</body>
</html>

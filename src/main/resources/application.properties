spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_formatura?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:Form@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.port=${SERVER_PORT:0}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080}
app.security.jwt-secret=${APP_SECURITY_JWT_SECRET:senac_formatura_secret_key_123}
app.bootstrap.create-default-admin=${APP_BOOTSTRAP_CREATE_DEFAULT_ADMIN:true}
app.bootstrap.default-admin-email=${APP_BOOTSTRAP_DEFAULT_ADMIN_EMAIL:admin@gestaoform.com}
app.bootstrap.default-admin-password=${APP_BOOTSTRAP_DEFAULT_ADMIN_PASSWORD:admin123}

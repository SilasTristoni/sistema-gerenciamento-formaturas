# Configuração do MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_formatura?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:Form@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração do JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Codificação (Para evitar erros de acentuação)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
